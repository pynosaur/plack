NAME: plack - Simple Python linter

VERSION: 0.1.0

DESCRIPTION: A lightweight Python linter with YAML configuration. Checks for common style issues including line length, trailing whitespace, blank lines, and indentation.

USAGE: plack [OPTIONS] [PATHS...]

OPTIONS:
  - "-d, --config PATH    Use custom YAML config file"
  - "--reset              Reset to default configuration"
  - "--show-config        Show current configuration"
  - "-r, --recursive      Recursively lint directories (default)"
  - "--no-recursive       Do not recurse into subdirectories"
  - "-l, --line-length N  Override max line length"
  - "--no-color           Disable colored output"
  - "-q, --quiet          Only show error count"
  - "-v, --version        Show version"
  - "--docs               Show documentation"

CONFIG:
  - "line_length: 88      Maximum line length"
  - "indent_size: 4       Spaces per indent level"
  - "max_blank_lines: 2   Max consecutive blank lines"
  - "trailing_whitespace: true   Check for trailing whitespace"
  - "final_newline: true  Require newline at end of file"
  - "tab_indent: false    Use tabs instead of spaces"

ERROR_CODES:
  - "E001  File not found"
  - "E002  Cannot read file"
  - "L001  Line too long"
  - "W001  Trailing whitespace"
  - "B001  Too many blank lines"
  - "I001  Wrong indentation character (tabs vs spaces)"
  - "I002  Indentation not multiple of indent_size"
  - "N001  No newline at end of file"

EXAMPLES:
  - "plack                 Lint current directory"
  - "plack src/            Lint src directory"
  - "plack main.py         Lint single file"
  - "plack --reset         Reset to default config"
  - "plack -d myconfig.yaml   Use custom config"
  - "plack -l 120 .        Override line length to 120"
  - "plack -q .            Quiet mode, show count only"

OUTPUT: Reports lint errors with file:line:col format. Errors (E) in red, warnings (W) in yellow, info in cyan.

AUTHOR: Pynosaur

DATE: 2026-03-23

NOTES: Config stored at ~/.config/plack/plack.yaml. Use --reset to generate default config file.
